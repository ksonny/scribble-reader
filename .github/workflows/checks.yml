on:
  push:

permissions:
  checks: write

jobs:
  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - uses: auguwu/clippy-action@1.5.0
        with:
            token: ${{ secrets.GITHUB_TOKEN }}

