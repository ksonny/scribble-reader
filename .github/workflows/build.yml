on:
  push:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 13114758
          packages: build-tools;35.0.1 ndk;29.0.14033849 platforms;android-35

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-linux-android,aarch64-linux-android
          rustflags: "--deny warnings"

      - uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-apk

      - name: build apk
        run: |
          cargo apk build --package scribble-reader --lib
          mkdir -p apks
          mv target/debug/apk/scribble-reader.apk apks/scribble-reader_debug.apk

      - uses: actions/upload-artifact@v6
        with:
          name: apks
          path: apks/*

      - uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            apks/*.apk
